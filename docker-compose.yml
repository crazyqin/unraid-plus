# unraid-plus one-shot deployment
#
# Usage:
#   docker compose up -d
# Then open http://<host>:8080

services:
  unraid-plus:
    # Build from source. To use a prebuilt image instead, comment `build:`
    # and uncomment `image: ghcr.io/crazyqin/unraid-plus:latest`.
    build:
      context: .
      dockerfile: Dockerfile
    # image: ghcr.io/crazyqin/unraid-plus:latest
    container_name: unraid-plus
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # ---- Server runtime ----
      UNRAIDPP_LISTEN: ":8080"
      UNRAIDPP_DATA_DIR: "/data"
      # Optional: pre-trust a Unraid host so the onboarding is skipped.
      # UNRAIDPP_DEFAULT_HOST: "192.168.1.99"
      # UNRAIDPP_LOG_LEVEL: "info"
      TZ: Asia/Shanghai
    volumes:
      # Persist server config (session keys, optional SSH key cache, settings)
      - unraid-plus-data:/data
    # In host-network mode on a NAS, you typically don't need `ports:`.
    # Uncomment the line below and remove `ports:` to use host networking.
    # network_mode: host

volumes:
  unraid-plus-data:
