<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!--
    noVNC for unraid-plus: lightweight VNC viewer with clipboard support.

    Connect parameters are provided in query string:
        /vnc/vnc_lite.html?url=ws://host:port/ws/vnc?vm=VMNAME&scale=true

    Clipboard: Click "粘贴" button or Shift+Insert to open the paste panel.
    Two paste modes:
      - "粘贴" (clipboardPasteFrom + Ctrl+V): fast, requires VNC clipboard
        extension support on the server (QEMU 8.0+ with -clipboard)
      - "逐字输入": types text character by character, works with all VNC
        servers but slower

    Based on noVNC vnc_lite.html (MPL 2.0 / 2-Clause BSD).
    -->
    <title>VNC 控制台</title>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: #1a1a2e;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        html { height: 100%; }

        #top_bar {
            background-color: #2d2d44;
            color: #e0e0e0;
            font: bold 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 6px 5px 4px 5px;
            border-bottom: 1px solid #3d3d5c;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        #status {
            text-align: center;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 8px;
        }
        .top-btn {
            border: 1px solid #5a5a8a;
            background-color: #3d3d5c;
            color: #e0e0e0;
            padding: 4px 10px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 11px;
            margin: 0 3px;
            white-space: nowrap;
        }
        .top-btn:hover { background-color: #5a5a8a; }
        .top-btn.active { background-color: #5a5a8a; border-color: #8a8abb; }

        #screen {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Clipboard panel overlay */
        #clipboard_panel {
            display: none;
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 340px;
            background-color: rgba(30, 30, 50, 0.97);
            border-left: 1px solid #3d3d5c;
            z-index: 100;
            flex-direction: column;
            padding: 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        #clipboard_panel.open { display: flex; }
        #clipboard_panel h3 {
            color: #e0e0e0;
            font-size: 13px;
            margin: 0 0 4px 0;
        }
        #clipboard_panel p {
            color: #a0a0b8;
            font-size: 11px;
            margin: 0 0 8px 0;
            line-height: 1.5;
        }
        #clipboard_text {
            flex: 1;
            width: 100%;
            resize: none;
            background-color: #1a1a2e;
            color: #e0e0e0;
            border: 1px solid #3d3d5c;
            border-radius: 3px;
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.4;
        }
        #clipboard_text:focus {
            outline: none;
            border-color: #7a7aaa;
        }
        .clip-btn-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .clip-btn {
            flex: 1;
            padding: 6px 8px;
            border: 1px solid #5a5a8a;
            background-color: #3d3d5c;
            color: #e0e0e0;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            text-align: center;
        }
        .clip-btn:hover { background-color: #5a5a8a; }
        .clip-btn.primary {
            background-color: #4a6fa5;
            border-color: #5a8ad5;
        }
        .clip-btn.primary:hover { background-color: #5a8ad5; }
        #typing_progress {
            color: #8a8abb;
            font-size: 11px;
            text-align: center;
            padding: 2px 0;
            display: none;
        }
    </style>

    <script type="module" crossorigin="anonymous">
        import RFB from './core/rfb.js';

        let rfb;
        let desktopName;
        let typingActive = false;
        let typingAbort = false;

        function connectedToServer(e) {
            status("已连接" + (desktopName ? " - " + desktopName : ""));
        }

        function disconnectedFromServer(e) {
            if (e.detail.clean) {
                status("已断开连接");
            } else {
                status("连接异常关闭");
            }
        }

        function credentialsAreRequired(e) {
            const password = prompt("请输入 VNC 密码：");
            rfb.sendCredentials({ password: password });
        }

        function updateDesktopName(e) {
            desktopName = e.detail.name;
            status("已连接 - " + desktopName);
        }

        function sendCtrlAltDel() {
            if (rfb) rfb.sendCtrlAltDel();
            return false;
        }

        function disconnect() {
            if (rfb) rfb.disconnect();
        }

        function status(text) {
            document.getElementById('status').textContent = text;
        }

        function readQueryVariable(name, defaultValue) {
            const re = new RegExp('.*[?&]' + name + '=([^&#]*)'),
                  match = document.location.href.match(re);
            if (match) {
                return decodeURIComponent(match[1]);
            }
            return defaultValue;
        }

        /* ---- Clipboard ---- */

        // When the VM sends clipboard data, store it so the user can copy it.
        function onClipboard(e) {
            document.getElementById('clipboard_text').value = e.detail.text;
        }

        // Toggle the clipboard panel open/closed.
        function toggleClipboard() {
            const panel = document.getElementById('clipboard_panel');
            panel.classList.toggle('open');
            const btn = document.getElementById('clipboardButton');
            if (panel.classList.contains('open')) {
                btn.classList.add('active');
                document.getElementById('clipboard_text').focus();
            } else {
                btn.classList.remove('active');
            }
        }

        function closeClipboard() {
            document.getElementById('clipboard_panel').classList.remove('open');
            document.getElementById('clipboardButton').classList.remove('active');
        }

        // Paste mode 1: Set VNC clipboard + send Ctrl+V.
        // This is fast but requires the VNC server to support clipboard.
        // Works with QEMU 8.0+ VNC when clipboard extension is enabled.
        function pasteClipboard() {
            if (!rfb) return;
            const text = document.getElementById('clipboard_text').value;
            if (!text) return;

            // Send text to VNC server clipboard
            rfb.clipboardPasteFrom(text);

            // Wait briefly, then simulate Ctrl+V to trigger paste in guest
            setTimeout(() => {
                rfb.sendKey(0xFFE3, 'ControlLeft', true);   // Ctrl down
                rfb.sendKey(0x0076, 'KeyV', true);          // V down
                rfb.sendKey(0x0076, 'KeyV', false);          // V up
                rfb.sendKey(0xFFE3, 'ControlLeft', false);  // Ctrl up
            }, 100);
        }

        // Paste mode 2: Type text character by character.
        // Slower but works with ALL VNC servers, no clipboard support needed.
        function pasteTyping() {
            if (!rfb || typingActive) return;
            const text = document.getElementById('clipboard_text').value;
            if (!text) return;

            typingActive = true;
            typingAbort = false;
            const progressEl = document.getElementById('typing_progress');
            progressEl.style.display = 'block';

            const chars = [...text];
            let i = 0;

            function typeNext() {
                if (typingAbort || i >= chars.length || !rfb) {
                    typingActive = false;
                    progressEl.style.display = 'none';
                    if (i >= chars.length) {
                        status("逐字输入完成");
                    }
                    return;
                }

                const ch = chars[i++];
                progressEl.textContent = `输入中… ${i}/${chars.length}`;

                const keysym = charToKeysym(ch);
                if (keysym !== null) {
                    rfb.sendKey(keysym);
                }

                // Delay between characters: 20ms for normal, 50ms after Enter
                const delay = (ch === '\n') ? 50 : 20;
                setTimeout(typeNext, delay);
            }

            typeNext();
        }

        function stopTyping() {
            typingAbort = true;
        }

        // Map a character to an X11 keysym value.
        // For basic ASCII, keysym = Unicode code point.
        // For non-ASCII, use the Unicode keysym range (0x01000000 + code point).
        function charToKeysym(ch) {
            const code = ch.codePointAt(0);

            // Newline -> Return key
            if (ch === '\n' || ch === '\r') return 0xFF0D;
            // Tab
            if (ch === '\t') return 0xFF09;

            // ASCII printable characters (0x20-0x7E): keysym matches Unicode
            if (code >= 0x20 && code <= 0x7E) return code;

            // Latin-1 supplement (0xA0-0xFF): keysym matches Unicode
            if (code >= 0xA0 && code <= 0xFF) return code;

            // Other Unicode: use Unicode keysym range
            // Many VNC servers support this, but not all
            return 0x01000000 + code;
        }

        // Global keyboard shortcut: Shift+Insert opens clipboard panel.
        document.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.key === 'Insert') {
                e.preventDefault();
                toggleClipboard();
            }
        });

        /* ---- Wire up buttons ---- */

        document.getElementById('sendCtrlAltDelButton').onclick = sendCtrlAltDel;
        document.getElementById('disconnectButton').onclick = disconnect;
        document.getElementById('clipboardButton').onclick = toggleClipboard;
        document.getElementById('clipboardPaste').onclick = pasteClipboard;
        document.getElementById('clipboardType').onclick = pasteTyping;
        document.getElementById('clipboardStop').onclick = stopTyping;
        document.getElementById('clipboardClose').onclick = closeClipboard;

        /* ---- Connect ---- */

        const url = readQueryVariable('url');

        if (!url) {
            status('错误：缺少 url 参数');
        } else {
            status("连接中…");

            const password = readQueryVariable('password');

            rfb = new RFB(document.getElementById('screen'), url,
                          { credentials: { password: password } });

            rfb.addEventListener("connect",  connectedToServer);
            rfb.addEventListener("disconnect", disconnectedFromServer);
            rfb.addEventListener("credentialsrequired", credentialsAreRequired);
            rfb.addEventListener("desktopname", updateDesktopName);
            rfb.addEventListener("clipboard", onClipboard);

            rfb.viewOnly = readQueryVariable('view_only', false);
            rfb.scaleViewport = readQueryVariable('scale', true);
            rfb.resizeSession = readQueryVariable('resize', false);
        }
    </script>
</head>

<body>
    <div id="top_bar">
        <div style="display:flex;align-items:center;gap:3px">
            <button class="top-btn" id="disconnectButton">断开</button>
            <button class="top-btn" id="clipboardButton">粘贴</button>
        </div>
        <div id="status">加载中</div>
        <button class="top-btn" id="sendCtrlAltDelButton">Ctrl+Alt+Del</button>
    </div>
    <div id="screen">
        <!-- This is where the remote screen will appear -->

        <!-- Clipboard panel -->
        <div id="clipboard_panel">
            <h3>剪贴板</h3>
            <p>在下方粘贴文本，选择发送方式：<br>
               <b>粘贴</b>：通过 VNC 剪贴板 + Ctrl+V，速度快但需要服务端支持<br>
               <b>逐字输入</b>：模拟键盘逐字输入，兼容所有虚拟机</p>
            <textarea id="clipboard_text" placeholder="在此粘贴文本…" spellcheck="false"></textarea>
            <div id="typing_progress">输入中…</div>
            <div class="clip-btn-row">
                <button class="clip-btn primary" id="clipboardPaste">粘贴</button>
                <button class="clip-btn primary" id="clipboardType">逐字输入</button>
            </div>
            <div class="clip-btn-row">
                <button class="clip-btn" id="clipboardStop" style="display:none">停止输入</button>
                <button class="clip-btn" id="clipboardClose">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // Show/hide stop button when typing is active
        const origPasteType = document.getElementById('clipboardType');
        const stopBtn = document.getElementById('clipboardStop');
        const origPastePaste = document.getElementById('clipboardPaste');
        const typingCheck = setInterval(() => {
            if (typingActive) {
                stopBtn.style.display = 'block';
                origPasteType.style.display = 'none';
                origPastePaste.style.display = 'none';
            } else {
                stopBtn.style.display = 'none';
                origPasteType.style.display = 'block';
                origPastePaste.style.display = 'block';
            }
        }, 100);
    </script>
</body>
</html>
